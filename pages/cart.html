<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Amazon Clone</title>
    <link rel="stylesheet" href="../css/styles.css">
    <!-- <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)"> -->
</head>
<body>
    <!-- Header (same as index.html but with ../ paths) -->
    <header class="header">
        <div class="header-left">
            <a href="../index.html" class="logo">
                <span class="logo-text">amazon</span>
                <span class="logo-suffix">.clone</span>
            </a>
        </div>
        <div class="header-center">
            <select class="search-category">
                <option value="all">All</option>
            </select>
            <input type="text" class="search-input" placeholder="Search Amazon Clone">
            <!-- <button class="search-btn"><i class="fas fa-search"></i></button> -->
             <button id="search-btn" class="search-btn">
    🔍
</button>
        </div>
        <div class="header-right">
            <div class="nav-item" id="auth-nav">
                <span class="nav-line-1">Hello, Sign in</span>
                <span class="nav-line-2">Account & Lists</span>
            </div>
            <a href="orders.html" class="nav-item">
                <span class="nav-line-1">Returns</span>
                <span class="nav-line-2">& Orders</span>
            </a>
            <a href="cart.html" class="nav-item cart-link">
                <div class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </div>
                <span class="nav-line-2">Cart</span>
            </a>
        </div>
    </header>

    <!-- Cart Content -->
    <main class="cart-page">
        <div class="cart-container">
            <div class="cart-items" id="cart-items">
                <!-- Cart items will be dynamically inserted -->
            </div>
            <div class="cart-summary" id="cart-summary">
                <!-- Cart summary will be dynamically inserted -->
            </div>
        </div>

        <!-- Empty Cart -->
        <div class="empty-cart" id="empty-cart" style="display: none;">
            <i class="fas fa-shopping-cart"></i>
            <h2>Your Amazon Clone Cart is empty</h2>
            <p>Shop today's deals</p>
            <a href="../index.html" class="continue-shopping-btn">Continue Shopping</a>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Item added to cart</span>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
