<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Amazon Clone</title>
    <link rel="stylesheet" href="../css/styles.css">
    <!-- <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)"> -->
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Checkout Header -->
    <header class="checkout-header">
        <a href="../index.html" class="logo">
            <span class="logo-text">amazon</span>
            <span class="logo-suffix">.clone</span>
        </a>
        <h1>Checkout</h1>
        <i class="fas fa-lock" style="color: #565959;"></i>
    </header>

    <!-- Checkout Content -->
    <main class="checkout-page">
        <div class="checkout-container">
            <div class="checkout-form">
                <form id="checkout-form">
                    <h2>1. Shipping Address</h2>
                    <div class="form-group">
                        <label for="shipping-name">Full name</label>
                        <input type="text" id="shipping-name" required>
                    </div>
                    <div class="form-group">
                        <label for="shipping-address">Address</label>
                        <input type="text" id="shipping-address" placeholder="Street address or P.O. Box" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="shipping-city">City</label>
                            <input type="text" id="shipping-city" required>
                        </div>
                        <div class="form-group">
                            <label for="shipping-state">State</label>
                            <input type="text" id="shipping-state" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="shipping-zip">ZIP Code</label>
                        <input type="text" id="shipping-zip" required>
                    </div>
                    <div class="form-group">
                        <label for="shipping-phone">Phone number</label>
                        <input type="tel" id="shipping-phone">
                    </div>

                    <h2>2. Payment Method</h2>
                    <div class="form-group">
                        <label for="card-number">Card number</label>
                        <input type="text" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19" required>
                    </div>
                    <div class="form-group">
                        <label for="card-name">Name on card</label>
                        <input type="text" id="card-name" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="card-expiry">Expiration date</label>
                            <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" required>
                        </div>
                        <div class="form-group">
                            <label for="card-cvv">CVV</label>
                            <input type="text" id="card-cvv" placeholder="123" maxlength="4" required>
                        </div>
                    </div>
                </form>
            </div>

            <div class="checkout-summary" id="checkout-summary">
                <!-- Checkout summary will be dynamically inserted -->
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Item added to cart</span>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="auth-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-auth-modal">&times;</span>
            <div id="auth-forms">
                <div id="sign-in-form" class="auth-form">
                    <h2>Sign In</h2>
                    <form id="login-form">
                        <div class="form-group">
                            <label for="login-email">Email</label>
                            <input type="email" id="login-email" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="auth-submit-btn">Sign In</button>
                    </form>
                    <p class="auth-switch">New to Amazon Clone? <a href="#" id="show-register">Create account</a></p>
                </div>
                <div id="register-form" class="auth-form" style="display: none;">
                    <h2>Create Account</h2>
                    <form id="signup-form">
                        <div class="form-group">
                            <label for="register-name">Your name</label>
                            <input type="text" id="register-name" required>
                        </div>
                        <div class="form-group">
                            <label for="register-email">Email</label>
                            <input type="email" id="register-email" required>
                        </div>
                        <div class="form-group">
                            <label for="register-password">Password</label>
                            <input type="password" id="register-password" minlength="6" required>
                        </div>
                        <div class="form-group">
                            <label for="register-confirm">Re-enter password</label>
                            <input type="password" id="register-confirm" required>
                        </div>
                        <button type="submit" class="auth-submit-btn">Create Account</button>
                    </form>
                    <p class="auth-switch">Already have an account? <a href="#" id="show-login">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="checkout-items"></div>

    <script src="../js/utils.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/checkout.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
