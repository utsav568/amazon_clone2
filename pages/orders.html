<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Orders - Amazon Clone</title>
    <link rel="stylesheet" href="../css/styles.css">
    <!-- <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)"> -->
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="../index.html" class="logo">
                <span class="logo-text">amazon</span>
                <span class="logo-suffix">.clone</span>
            </a>
        </div>
        <div class="header-center">
            <select class="search-category">
                <option value="all">All</option>
            </select>
            <input type="text" class="search-input" placeholder="Search Amazon Clone">
            <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>
        <div class="header-right">
            <div class="nav-item" id="auth-nav">
                <span class="nav-line-1">Hello, Sign in</span>
                <span class="nav-line-2">Account & Lists</span>
            </div>
            <a href="orders.html" class="nav-item">
                <span class="nav-line-1">Returns</span>
                <span class="nav-line-2">& Orders</span>
            </a>
            <a href="cart.html" class="nav-item cart-link">
                <div class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </div>
                <span class="nav-line-2">Cart</span>
            </a>
        </div>
    </header>

    <!-- Orders Content -->
    <main class="orders-page">
        <div class="orders-header">
            <h1>Your Orders</h1>
        </div>
        <div id="orders-container">
            <!-- Orders will be dynamically inserted -->
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Item added to cart</span>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="auth-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-auth-modal">&times;</span>
            <div id="auth-forms">
                <div id="sign-in-form" class="auth-form">
                    <h2>Sign In</h2>
                    <form id="login-form">
                        <div class="form-group">
                            <label for="login-email">Email</label>
                            <input type="email" id="login-email" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="auth-submit-btn">Sign In</button>
                    </form>
                    <p class="auth-switch">New to Amazon Clone? <a href="#" id="show-register">Create account</a></p>
                </div>
                <div id="register-form" class="auth-form" style="display: none;">
                    <h2>Create Account</h2>
                    <form id="signup-form">
                        <div class="form-group">
                            <label for="register-name">Your name</label>
                            <input type="text" id="register-name" required>
                        </div>
                        <div class="form-group">
                            <label for="register-email">Email</label>
                            <input type="email" id="register-email" required>
                        </div>
                        <div class="form-group">
                            <label for="register-password">Password</label>
                            <input type="password" id="register-password" minlength="6" required>
                        </div>
                        <div class="form-group">
                            <label for="register-confirm">Re-enter password</label>
                            <input type="password" id="register-confirm" required>
                        </div>
                        <button type="submit" class="auth-submit-btn">Create Account</button>
                    </form>
                    <p class="auth-switch">Already have an account? <a href="#" id="show-login">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/checkout.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
